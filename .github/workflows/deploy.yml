name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "web/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
  # The scrape job commits with GITHUB_TOKEN, which by design does not trigger
  # the push event above. Chain off the scrape workflow's completion instead.
  workflow_run:
    workflows: ["Daily scrape → data JSON"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # When chained from the scrape workflow, only deploy if it succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        # Project site lives at meisterkompass.eu/, so assets
        # must be served from that base path. For a custom domain, set "/".
        env:
          VITE_BASE: "/"
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
