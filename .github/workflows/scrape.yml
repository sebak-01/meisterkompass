name: Daily scrape → data JSON

on:
  schedule:
    - cron: "0 3 * * *"   # Daily at 03:00 UTC
  workflow_dispatch:        # Allow manual trigger from the GitHub UI

permissions:
  contents: read

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        group: [west, south, east, north]

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape regional batch
        run: python -m scrapers.run --group ${{ matrix.group }} --partial-out partial-${{ matrix.group }}.json

      - name: Upload scrape partial
        uses: actions/upload-artifact@v6
        with:
          name: partial-${{ matrix.group }}
          path: partial-${{ matrix.group }}.json
          retention-days: 1

  merge:
    needs: scrape
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          # SCRAPE_APP_ID must be the App's Client ID (GitHub App settings page).
          client-id: ${{ vars.SCRAPE_APP_ID }}
          private-key: ${{ secrets.SCRAPE_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Check out code
        uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download scrape partials
        uses: actions/download-artifact@v6
        with:
          path: partials
          pattern: partial-*
          merge-multiple: true

      - name: Merge partials → data/*.json
        run: python -m scrapers.run --merge-partials partials/partial-*.json

      - name: Commit data changes
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          git config user.name  "${APP_SLUG}[bot]"
          git config user.email "${APP_SLUG}[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "data: scheduled scrape $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      - name: Notify on failure
        if: failure()
        run: echo "Scraper run failed — check logs above."
