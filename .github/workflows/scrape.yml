name: Daily scrape → data JSON

on:
  schedule:
    - cron: "0 3 * * *"   # Daily at 03:00 UTC
  workflow_dispatch:        # Allow manual trigger from the GitHub UI

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scrapers → data/*.json
        run: python -m scrapers.run

      - name: Commit data changes
        run: |
          git config user.name  "scrape-bot"
          git config user.email "scrape-bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "data: scheduled scrape $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      - name: Notify on failure
        if: failure()
        run: echo "Scraper run failed — check logs above."
