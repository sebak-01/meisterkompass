<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MeisterKompass{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F4F1EB;
      --bg-card:   #FFFFFF;
      --navy:      #1B3A5C;
      --navy-mid:  #2A5080;
      --amber:     #C97B1A;
      --amber-lt:  #F0A830;
      --text:      #1E1E1E;
      --text-mid:  #555555;
      --text-lt:   #888888;
      --border:    #DDD9D0;
      --radius:    6px;
      --shadow:    0 1px 4px rgba(0,0,0,.08);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Single nav bar: brand left, tabs right ── */
    .topbar {
      background: var(--navy);
      border-bottom: 3px solid var(--amber);
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .topbar .container {
      display: flex;
      align-items: stretch;
      height: 54px;
    }
    .nav-brand {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.2rem;
      color: #FFFFFF;
      text-decoration: none;
      letter-spacing: -0.5px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      padding-right: 2rem;
      flex-shrink: 0;
    }
    .nav-brand span { color: var(--amber-lt); }

    .nav-tabs {
      display: flex;
      align-items: stretch;
      margin-left: auto;
      gap: 0;
    }
    .nav-tabs a {
      display: inline-flex;
      align-items: center;
      padding: 0 1.1rem;
      font-size: .85rem;
      font-weight: 500;
      color: rgba(255,255,255,.65);
      text-decoration: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -3px;
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }
    .nav-tabs a:hover { color: #fff; }
    .nav-tabs a.active {
      color: #fff;
      border-bottom-color: var(--amber-lt);
      font-weight: 600;
    }

    /* ── Page container ── */
    .container { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }

    /* ── Misc ── */
    a { color: var(--navy-mid); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: .72rem;
      font-weight: 500;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-mid);
    }
    .badge-full      { background: #FEE2E2; border-color: #FCA5A5; color: #991B1B; }
    .badge-few       { background: #FEF9C3; border-color: #FCD34D; color: #92400E; }
    .badge-available { background: #DCFCE7; border-color: #86EFAC; color: #166534; }

    /* ── Static page content ── */
    .page-content {
      max-width: 820px;
      margin: 2.5rem auto;
      padding: 2rem;
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      line-height: 1.7;
    }
    .page-content h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 1.25rem;
    }
    .page-content h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--navy);
      margin: 1.75rem 0 .6rem;
    }
    .page-content p { margin-bottom: 1rem; color: var(--text-mid); }
    .page-content ul { margin: .5rem 0 1rem 1.4rem; color: var(--text-mid); }
    .page-content li { margin-bottom: .35rem; }
    .page-content a { color: var(--navy-mid); }
    .placeholder-box {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      text-align: center;
      color: var(--text-lt);
      font-style: italic;
      margin: 1.5rem 0;
    }
    /* ── Responsive ── */
    @media (max-width: 640px) {
      .topbar .container { height: auto; flex-wrap: wrap; padding: .6rem .75rem; gap: .4rem; }
      .nav-brand { padding-right: 0; font-size: 1.05rem; }
      .nav-tabs { margin-left: 0; width: 100%; overflow-x: auto; gap: 0; }
      .nav-tabs a { padding: .4rem .75rem; font-size: .78rem; }
      .container { padding: 0 .5rem; }
      .page-content { padding: 1.25rem; margin: 1rem auto; }
    }
    @media (min-width: 641px) and (max-width: 1024px) {
      .topbar .container { height: 54px; }
      .nav-tabs a { padding: 0 .85rem; font-size: .82rem; }
      .container { padding: 0 1rem; }
    }

  /* ── Enhanced headers (point 1) ── */
  .page-header, .afbg-hero {
    background: linear-gradient(135deg, var(--navy) 0%, #0f2440 100%);
    position: relative;
    overflow: hidden;
  }
  .page-header::before, .afbg-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 15% 60%, rgba(201,123,26,.10) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 15%, rgba(255,255,255,.05) 0%, transparent 45%);
    pointer-events: none;
  }
  .page-header .container, .afbg-hero .container { position: relative; }

  /* ── Mobile hamburger menu ── */
  .hamburger {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    padding: .4rem;
    color: rgba(255,255,255,.85);
    font-size: 1.4rem;
    line-height: 1;
    margin-left: auto;
  }
  .mobile-menu {
    display: none;
    position: fixed;
    top: 57px;   /* header height */
    right: 0;
    left: 0;
    background: var(--navy);
    border-top: 1px solid rgba(255,255,255,.1);
    z-index: 200;
    padding: .5rem 0;
    box-shadow: 0 4px 12px rgba(0,0,0,.3);
  }
  .mobile-menu.open { display: block; }
  .mobile-menu a {
    display: block;
    padding: .75rem 1.25rem;
    color: rgba(255,255,255,.8);
    text-decoration: none;
    font-size: .9rem;
    border-bottom: 1px solid rgba(255,255,255,.07);
  }
  .mobile-menu a:last-child { border-bottom: none; }
  .mobile-menu a:hover,
  .mobile-menu a.active { color: #fff; background: rgba(255,255,255,.08); }
  @media (max-width: 640px) {
    .nav-tabs { display: none; }
    .hamburger { display: block; }
  }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>

<header class="topbar">
  <div class="container">
    <a class="nav-brand" href="/">Meister<span>Kompass</span></a>
    <nav class="nav-tabs">
      <a href="/"         class="{% block tab_finder %}{% endblock %}">Kursfinder</a>
      <a href="/afbg/"    class="{% block tab_afbg %}{% endblock %}">AFBG-Rechner</a>
      <a href="/about/"   class="{% block tab_about %}{% endblock %}">Über MeisterKompass</a>
      <a href="/imprint/" class="{% block tab_impressum %}{% endblock %}">Impressum</a>
    </nav>
    <button class="hamburger" id="hamburger-btn" aria-label="Menü öffnen" onclick="toggleMenu()">☰</button>
  </div>
  <div class="mobile-menu" id="mobile-menu">
    <a href="/"         class="{% block mob_finder %}{% endblock %}">Kursfinder</a>
    <a href="/afbg/"    class="{% block mob_afbg %}{% endblock %}">AFBG-Rechner</a>
    <a href="/about/"   class="{% block mob_about %}{% endblock %}">Über MeisterKompass</a>
    <a href="/imprint/" class="{% block mob_impressum %}{% endblock %}">Impressum</a>
  </div>
</header>
<script>
function toggleMenu() {
  var m = document.getElementById('mobile-menu');
  var b = document.getElementById('hamburger-btn');
  m.classList.toggle('open');
  b.textContent = m.classList.contains('open') ? '✕' : '☰';
}
// Close menu on nav click
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.mobile-menu a').forEach(function(a) {
    a.addEventListener('click', function() {
      document.getElementById('mobile-menu').classList.remove('open');
      document.getElementById('hamburger-btn').textContent = '☰';
    });
  });
});
</script>

{% block content %}{% endblock %}

</body>
</html>
